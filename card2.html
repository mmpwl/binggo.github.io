<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>การ์ดให้กำลังใจ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400&family=Sarabun:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: #f5f0ed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 500px;
        }

        .card-deck {
            position: absolute;
            width: 280px;
            height: 380px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: transform 0.3s ease;
            touch-action: manipulation;
        }

        .card-deck:hover {
            transform: translate(-50%, -50%) translateY(-5px);
        }

        .card-deck:active {
            transform: translate(-50%, -50%) scale(0.98);
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(198, 167, 154, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #c6a79a;
            font-size: 1.1em;
            font-weight: 300;
            transition: all 0.3s ease;
            border: 1px solid rgba(198, 167, 154, 0.1);
            letter-spacing: 0.5px;
        }

        .card:nth-child(1) {
            transform: rotate(-2deg) translateY(0px);
            z-index: 3;
        }

        .card:nth-child(2) {
            transform: rotate(1.5deg) translateY(-4px);
            z-index: 2;
            opacity: 0.9;
        }

        .card:nth-child(3) {
            transform: rotate(-0.5deg) translateY(-8px);
            z-index: 1;
            opacity: 0.8;
        }

        .card-icon {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .opened-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 90%;
            max-width: 500px;
            height: auto;
            max-height: 90vh;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(198, 167, 154, 0.2);
            z-index: 1000;
            display: none;
            padding: 35px;
            animation: cardFlip 0.5s ease;
            overflow: hidden;
            border: 1px solid rgba(198, 167, 154, 0.1);
        }

        .opened-card.show {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        @keyframes cardFlip {
            0% {
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .card-image {
            max-width: 100%;
            max-height: 70vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
        }

        .close-btn {
            background: #c6a79a;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 0.95em;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
            letter-spacing: 0.5px;
            font-family: 'Sarabun', sans-serif;
            touch-action: manipulation;
        }

        .close-btn:hover {
            background: #b89888;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(198, 167, 154, 0.25);
        }

        .close-btn:active {
            transform: translateY(0);
            background: #a78878;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 240, 237, 0.85);
            z-index: 999;
            display: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .overlay.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #c6a79a;
            font-size: 1.8em;
            font-weight: 300;
            font-family: 'Mitr', sans-serif;
            text-align: center;
            letter-spacing: 0.5px;
            width: 100%;
            padding: 0 20px;
        }

        .menu-btn {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            color: #c6a79a;
            border: 1px solid rgba(198, 167, 154, 0.2);
            padding: 11px 28px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(198, 167, 154, 0.15);
            letter-spacing: 0.5px;
            font-family: 'Sarabun', sans-serif;
            touch-action: manipulation;
        }

        .menu-btn:hover {
            background: #faf8f7;
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 6px 18px rgba(198, 167, 154, 0.2);
        }

        .menu-btn:active {
            transform: translateX(-50%) translateY(0);
            background: #f0ebe8;
        }

        /* Tablet (สำหรับหน้าจอ 768px ลงมา) */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                height: 450px;
            }

            .card-deck {
                width: 260px;
                height: 350px;
            }

            .opened-card {
                padding: 30px 25px;
                width: 92%;
                max-height: 88vh;
            }

            .title {
                font-size: 1.6em;
                top: 25px;
            }

            .card-image {
                max-height: 65vh;
            }

            .close-btn {
                padding: 11px 30px;
                font-size: 0.9em;
            }

            .menu-btn {
                bottom: -60px;
                padding: 10px 25px;
                font-size: 0.85em;
            }
        }

        /* มือถือขนาดกลาง (480px - 600px) */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                height: 420px;
            }

            .card-deck {
                width: 240px;
                height: 330px;
            }

            .card {
                font-size: 1em;
            }

            .card-icon {
                font-size: 45px;
                margin-bottom: 12px;
            }

            .title {
                font-size: 1.5em;
                top: 20px;
            }

            .opened-card {
                padding: 25px 20px;
                width: 94%;
                max-height: 86vh;
            }

            .card-image {
                max-height: 62vh;
            }

            .close-btn {
                padding: 10px 28px;
                font-size: 0.88em;
                margin-top: 20px;
            }

            .menu-btn {
                bottom: -55px;
            }
        }

        /* มือถือขนาดเล็ก (480px ลงมา) */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .container {
                height: 400px;
            }

            .card-deck {
                width: 220px;
                height: 310px;
            }

            .card {
                font-size: 0.95em;
                border-radius: 10px;
            }

            .card-icon {
                font-size: 42px;
                margin-bottom: 10px;
            }

            .title {
                font-size: 1.4em;
                top: 15px;
            }

            .opened-card {
                padding: 22px 18px;
                width: 95%;
                max-height: 85vh;
                border-radius: 10px;
            }

            .card-image {
                max-height: 60vh;
                border-radius: 6px;
            }

            .close-btn {
                padding: 10px 26px;
                font-size: 0.85em;
                margin-top: 18px;
            }

            .menu-btn {
                bottom: -50px;
                padding: 9px 22px;
                font-size: 0.82em;
            }
        }

        /* มือถือจิ๋ว (360px ลงมา) */
        @media (max-width: 360px) {
            body {
                padding: 5px;
            }

            .container {
                height: 380px;
            }

            .card-deck {
                width: 200px;
                height: 290px;
            }

            .card {
                font-size: 0.9em;
            }

            .card-icon {
                font-size: 38px;
                margin-bottom: 8px;
            }

            .title {
                font-size: 1.3em;
                top: 12px;
            }

            .opened-card {
                padding: 20px 15px;
                width: 96%;
                max-height: 84vh;
            }

            .card-image {
                max-height: 58vh;
            }

            .close-btn {
                padding: 9px 24px;
                font-size: 0.82em;
                margin-top: 16px;
            }

            .menu-btn {
                bottom: -48px;
                padding: 8px 20px;
                font-size: 0.8em;
            }
        }

        /* แนวนอน (Landscape) สำหรับมือถือ */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 10px;
            }

            .container {
                height: 320px;
            }

            .card-deck {
                width: 200px;
                height: 280px;
            }

            .title {
                font-size: 1.2em;
                top: 10px;
            }

            .opened-card {
                padding: 20px 15px;
                max-height: 92vh;
            }

            .card-image {
                max-height: 70vh;
            }

            .close-btn {
                padding: 8px 22px;
                font-size: 0.8em;
                margin-top: 12px;
            }

            .menu-btn {
                bottom: -45px;
                padding: 7px 18px;
                font-size: 0.78em;
            }
        }
    </style>
</head>
<body>
    <div class="title">การ์ดให้กำลังใจ</div>
    
    <div class="container">
        <div class="card-deck" onclick="drawCard()">
            <div class="card">
                <div class="card-icon">♡</div>
                <div>คลิกเพื่อจั่วการ์ด</div>
            </div>
            <div class="card">
                <div class="card-icon">♡</div>
            </div>
            <div class="card">
                <div class="card-icon">♡</div>
            </div>
        </div>
        <button class="menu-btn" onclick="resetToMenu()">← กลับ</button>
    </div>

    <div class="overlay" id="overlay" onclick="closeCard()"></div>
    
    <div class="opened-card" id="openedCard">
        <div class="card-content">
            <img id="cardImage" class="card-image" src="" alt="การ์ดให้กำลังใจ">
        </div>
        <button class="close-btn" onclick="closeCard()">ปิดการ์ด</button>
    </div>

    <script>
        // Array of card image paths (10 cards)
        const cardImages = [
            'card1.png',
            'card2.png',
            'card3.png',
            'card4.png',
            'card5.png',
            'card6.png',
            'card7.png',
            'card8.png',
            'card9.png',
            'card10.png'
        ];

        let usedCards = [];

        function drawCard() {
            // Reset if all cards have been used
            if (usedCards.length === cardImages.length) {
                usedCards = [];
            }

            // Get available cards
            const availableIndices = cardImages
                .map((_, index) => index)
                .filter(index => !usedCards.includes(index));

            // Pick a random card from available ones
            const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            usedCards.push(randomIndex);

            const cardImage = cardImages[randomIndex];

            // Update card image
            document.getElementById('cardImage').src = cardImage;

            // Show the card
            document.getElementById('overlay').classList.add('show');
            document.getElementById('openedCard').classList.add('show');

            // Prevent body scroll when card is open
            document.body.style.overflow = 'hidden';
        }

        function closeCard() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('openedCard').classList.remove('show');
            
            // Re-enable body scroll
            document.body.style.overflow = 'auto';
        }

        function resetToMenu() {
            // Navigate back to previous page
            window.history.back();
        }

        // Close card when pressing Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeCard();
            }
        });

        // Prevent scroll on touch devices when overlay is shown
        document.getElementById('overlay').addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
