<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>เกมจิ๊กซอภาพคู่รัก 16 ชิ้น</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body, html {
      height: 100%;
      font-family: 'Prompt', sans-serif;
      background: #fafafa;
      overflow-x: hidden;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Floating Hearts Background */
    @keyframes floatUp {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }

    .heart-bg {
      position: fixed;
      font-size: 20px;
      color: #ff69b4;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      animation: floatUp 20s infinite ease-in-out;
    }

    .heart-bg:nth-child(1) { left: 5%; animation-delay: 0s; font-size: 15px; }
    .heart-bg:nth-child(2) { left: 15%; animation-delay: 3s; font-size: 25px; }
    .heart-bg:nth-child(3) { left: 25%; animation-delay: 6s; font-size: 18px; }
    .heart-bg:nth-child(4) { left: 35%; animation-delay: 9s; font-size: 22px; }
    .heart-bg:nth-child(5) { left: 45%; animation-delay: 12s; font-size: 16px; }
    .heart-bg:nth-child(6) { left: 55%; animation-delay: 2s; font-size: 24px; }
    .heart-bg:nth-child(7) { left: 65%; animation-delay: 5s; font-size: 19px; }
    .heart-bg:nth-child(8) { left: 75%; animation-delay: 8s; font-size: 21px; }
    .heart-bg:nth-child(9) { left: 85%; animation-delay: 11s; font-size: 17px; }
    .heart-bg:nth-child(10) { left: 95%; animation-delay: 4s; font-size: 23px; }

    /* Start Screen */
    #startScreen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      background: linear-gradient(to bottom, #ffffff 0%, #fff5f8 100%);
      position: relative;
      z-index: 1;
    }

    .start-title {
      font-size: 3em;
      font-weight: 400;
      color: #2c2c2c;
      margin-bottom: 20px;
      letter-spacing: 2px;
      animation: fadeInDown 0.8s ease;
      position: relative;
    }

    .start-title::after {
      content: '♥';
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6em;
      color: #ff69b4;
      opacity: 0.7;
      animation: heartPulse 2s ease-in-out infinite;
    }

    @keyframes heartPulse {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        opacity: 0.7;
      }
      50% {
        transform: translateX(-50%) scale(1.2);
        opacity: 1;
      }
    }

    .subtitle {
      font-size: 1em;
      font-weight: 300;
      color: #999;
      margin-bottom: 50px;
      letter-spacing: 1px;
      animation: fadeInDown 0.8s ease 0.2s backwards;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #startScreen button {
      font-size: 1.2em;
      font-weight: 400;
      padding: 18px 60px;
      border-radius: 50px;
      border: 2px solid #2c2c2c;
      background: #ffffff;
      color: #2c2c2c;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      animation: fadeInUp 0.8s ease 0.4s backwards;
      position: relative;
      overflow: hidden;
    }

    #startScreen button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 105, 180, 0.1);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    #startScreen button:active::before {
      width: 300px;
      height: 300px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #startScreen button:active {
      background: #2c2c2c;
      color: #ffffff;
      transform: scale(0.98);
    }

    /* Decorative Elements */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 105, 180, 0.15);
      animation: rotate 30s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .deco-circle-1 {
      width: 300px;
      height: 300px;
      top: 10%;
      right: 10%;
    }

    .deco-circle-2 {
      width: 200px;
      height: 200px;
      bottom: 15%;
      left: 5%;
      animation-direction: reverse;
    }

    /* Game Wrapper */
    #gameWrapper {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px 15px;
      min-height: 100vh;
      background: linear-gradient(to bottom, #fafafa 0%, #fff5f8 100%);
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #2c2c2c;
      font-size: 2em;
      font-weight: 400;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 1px;
      animation: fadeIn 0.6s ease;
      position: relative;
    }

    h1::before,
    h1::after {
      content: '♡';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.6em;
      color: #ff69b4;
      opacity: 0.5;
    }

    h1::before {
      left: -40px;
    }

    h1::after {
      right: -40px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Image Selector */
    #imageSelector {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeIn 0.8s ease 0.2s backwards;
    }

    .thumbnail {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: grayscale(100%);
      opacity: 0.6;
      position: relative;
    }

    .thumbnail::after {
      content: '♥';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2.5em;
      color: #ff69b4;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .thumbnail:active::after {
      transform: translate(-50%, -50%) scale(1);
      opacity: 0.7;
    }

    .thumbnail:active {
      filter: grayscale(0%);
      opacity: 1;
      transform: scale(0.95);
    }

    .thumbnail.selected {
      border-color: #ff69b4;
      filter: grayscale(0%);
      opacity: 1;
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
    }

    /* Game Container */
    #gameContainer {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      animation: fadeIn 1s ease 0.4s backwards;
      width: 100%;
    }

    .columnLayout {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      width: 100%;
    }

    #puzzleBoard, #pieceContainer {
      width: min(90vw, 340px);
      height: min(90vw, 340px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 2px;
      background: #ffffff;
      border: 1px solid #ffe0ec;
      border-radius: 4px;
      padding: 8px;
      transition: all 0.3s ease;
    }

    #puzzleBoard {
      box-shadow: 0 2px 12px rgba(255, 105, 180, 0.1);
    }

    #pieceContainer {
      background: #fff9fb;
      box-shadow: 0 2px 12px rgba(255, 105, 180, 0.08);
    }

    .piece {
      width: 100%;
      height: 100%;
      background-size: calc(100% * 4 - 8px) calc(100% * 4 - 8px);
      background-repeat: no-repeat;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s ease;
      position: relative;
      touch-action: none;
    }

    .piece.dragging {
      opacity: 0.7;
      transform: scale(1.1);
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(255, 105, 180, 0.4);
    }

    .piece:active {
      transform: scale(1.05);
    }

    .dropzone {
      background: #fff9fb;
      border: 1px dashed #ffe0ec;
      border-radius: 2px;
      transition: all 0.2s ease;
      position: relative;
    }

    .dropzone.drag-over {
      background: #fff;
      border-color: #ff69b4;
      transform: scale(1.02);
    }

    .dropzone::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.3), transparent);
      border-radius: 50%;
      transition: transform 0.3s ease;
    }

    .dropzone.drag-over::after {
      transform: translate(-50%, -50%) scale(2);
    }

    /* Popup */
    #popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: #ffffff;
      border: 1px solid #ffe0ec;
      padding: 40px 50px;
      text-align: center;
      font-size: 1.4em;
      font-weight: 400;
      color: #2c2c2c;
      z-index: 1000;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(255, 105, 180, 0.2);
      animation: popupShow 0.4s ease forwards;
      letter-spacing: 1px;
      max-width: 90%;
    }

    @keyframes popupShow {
      to {
        transform: translate(-50%, -50%) scale(1);
      }
    }

    #popup::before {
      content: '♥';
      font-size: 2.5em;
      display: block;
      margin-bottom: 15px;
      color: #ff69b4;
      font-weight: 300;
      animation: heartbeat 1s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      25% {
        transform: scale(1.2);
      }
      50% {
        transform: scale(1);
      }
      75% {
        transform: scale(1.1);
      }
    }

    button {
      margin-top: 20px;
      padding: 14px 40px;
      background: #ffffff;
      color: #2c2c2c;
      border: 2px solid #2c2c2c;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 400;
      transition: all 0.3s ease;
      font-family: 'Prompt', sans-serif;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 105, 180, 0.1);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    button:active::before {
      width: 300px;
      height: 300px;
    }

    button:active {
      background: #2c2c2c;
      color: #ffffff;
      transform: scale(0.98);
    }

    /* Overlay */
    #overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      z-index: 999;
    }

    /* Progress Indicator */
    .progress-container {
      width: 100%;
      max-width: min(90vw, 680px);
      margin-bottom: 20px;
      animation: fadeIn 1s ease 0.6s backwards;
      padding: 0 10px;
    }

    .progress-bar {
      height: 4px;
      background: #ffe0ec;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff69b4, #ff85c0);
      border-radius: 2px;
      transition: width 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(100%);
      }
    }

    .progress-text {
      text-align: center;
      color: #666;
      font-weight: 400;
      margin-top: 10px;
      font-size: 0.85em;
      letter-spacing: 0.5px;
    }

    /* Button Container */
    .button-container {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
      padding: 0 15px;
    }

    .game-button {
      background: #ffffff;
      border: 2px solid #ffe0ec;
      padding: 12px 30px;
      font-size: 0.95em;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .game-button:active {
      background: #fff9fb;
      border-color: #ff69b4;
      color: #2c2c2c;
      transform: scale(0.98);
    }

    /* Correct Piece Style */
    .piece.correct {
      box-shadow: 0 0 15px rgba(255, 105, 180, 0.4) !important;
      opacity: 1;
      animation: correctPulse 0.6s ease;
      pointer-events: none;
    }

    @keyframes correctPulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    /* Sparkle effect on correct placement */
    @keyframes sparkle {
      0%, 100% {
        opacity: 0;
        transform: scale(0) rotate(0deg);
      }
      50% {
        opacity: 1;
        transform: scale(1) rotate(180deg);
      }
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #ff69b4;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      pointer-events: none;
      animation: sparkle 1s ease-out forwards;
    }

    /* Mobile Specific Adjustments */
    @media (max-width: 768px) {
      .start-title {
        font-size: 2em;
      }

      .subtitle {
        font-size: 0.85em;
        padding: 0 20px;
        text-align: center;
      }

      h1 {
        font-size: 1.5em;
      }

      h1::before,
      h1::after {
        display: none;
      }

      .thumbnail {
        width: 90px;
        height: 90px;
      }

      #popup {
        padding: 30px 40px;
        font-size: 1.2em;
      }

      .button-container {
        flex-direction: column;
        align-items: stretch;
      }

      .game-button {
        width: 100%;
        justify-content: center;
      }

      .deco-circle-1,
      .deco-circle-2 {
        display: none;
      }

      #gameWrapper {
        padding: 15px 10px;
      }

      .columnLayout {
        gap: 15px;
      }
    }

    @media (max-width: 480px) {
      .start-title {
        font-size: 1.6em;
      }

      #startScreen button {
        padding: 15px 45px;
        font-size: 1em;
      }

      h1 {
        font-size: 1.3em;
      }

      .thumbnail {
        width: 80px;
        height: 80px;
      }

      #popup {
        padding: 25px 30px;
        font-size: 1.1em;
      }

      button {
        padding: 12px 30px;
        font-size: 0.95em;
      }
    }

    /* Landscape mode on mobile */
    @media (max-height: 600px) and (orientation: landscape) {
      #gameWrapper {
        padding: 10px;
      }

      h1 {
        font-size: 1.2em;
        margin-bottom: 5px;
      }

      #imageSelector {
        margin-bottom: 15px;
        gap: 10px;
      }

      .thumbnail {
        width: 70px;
        height: 70px;
      }

      .progress-container {
        margin-bottom: 10px;
      }

      .columnLayout {
        flex-direction: row;
        gap: 15px;
      }

      #puzzleBoard, #pieceContainer {
        width: min(45vw, 280px);
        height: min(45vw, 280px);
      }

      .button-container {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Hearts Background -->
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>
  <div class="heart-bg">♥</div>

  <div id="startScreen">
    <div class="deco-circle deco-circle-1"></div>
    <div class="deco-circle deco-circle-2"></div>
    
    <div class="start-title">Jigsaw Puzzle</div>
    <div class="subtitle">เกมส์มีเสียงพื้นหลังนะคะ</div>
    <button id="startBtn">เริ่มเกม</button>
  </div>

  <div id="gameWrapper">
    <audio id="bgm" loop></audio>

    <h1>เกมจิ๊กซอ 16 ชิ้น</h1>

    <div id="imageSelector">
      <img src="image1.jpg" class="thumbnail" data-image="image1.jpg" alt="ภาพ 1" />
      <img src="image2.jpg" class="thumbnail" data-image="image2.jpg" alt="ภาพ 2" />
      <img src="image3.jpg" class="thumbnail" data-image="image3.jpg" alt="ภาพ 3" />
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">เลือกภาพเพื่อเริ่มเล่น</div>
    </div>

    <div id="gameContainer">
      <div class="columnLayout">
        <div id="puzzleBoard"></div>
        <div id="pieceContainer"></div>
      </div>
    </div>

    <div class="button-container">
      <button id="backBtn" class="game-button">
        ← ย้อนกลับ
      </button>
      <button id="restartBtn" class="game-button">
        ⟳ เริ่มใหม่
      </button>
    </div>
  </div>

  <div id="overlay"></div>
  <div id="popup">
    เสร็จสมบูรณ์แล้ว<br />
    <button onclick="resetGame()">เล่นอีกครั้ง</button>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const startScreen = document.getElementById('startScreen');
    const gameWrapper = document.getElementById('gameWrapper');
    const bgm = document.getElementById('bgm');
    const overlay = document.getElementById('overlay');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      gameWrapper.style.display = 'flex';
      bgm.src = "https://media.vocaroo.com/mp3/1mDg7B7XQf5Y";
      bgm.play().catch(e => console.log('Audio play failed:', e));
    });

    const backBtn = document.getElementById('backBtn');
    backBtn.addEventListener('click', () => {
      window.location.href = "game-menu.html";
    });

    const restartBtn = document.getElementById('restartBtn');
    restartBtn.addEventListener('click', () => {
      if (confirm('ต้องการเริ่มเกมใหม่ทั้งหมด?\nความคืบหน้าจะถูกรีเซ็ต')) {
        for (const key in completedPuzzles) {
          delete completedPuzzles[key];
        }
        overlay.style.display = 'none';
        popup.style.display = 'none';
        document.getElementById('gameContainer').style.display = 'none';
        document.querySelectorAll('.thumbnail').forEach(img => img.classList.remove('selected'));
        currentImage = null;
        progressFill.style.width = '0%';
        progressText.textContent = 'เลือกภาพเพื่อเริ่มเล่น';
      }
    });

    const rows = 4;
    const cols = 4;
    const totalPieces = rows * cols;

    const puzzleBoard = document.getElementById('puzzleBoard');
    const pieceContainer = document.getElementById('pieceContainer');
    const popup = document.getElementById('popup');

    let correct = 0;
    const completedPuzzles = {};
    const imageList = ['image1.jpg', 'image2.jpg', 'image3.jpg'];
    let currentImage = null;

    // Touch/Drag support variables
    let draggedPiece = null;
    let touchStartX = 0;
    let touchStartY = 0;
    let pieceStartX = 0;
    let pieceStartY = 0;

    // Create sparkle effect
    function createSparkles(element) {
      const rect = element.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      for (let i = 0; i < 6; i++) {
        const sparkle = document.createElement('div');
        sparkle.classList.add('sparkle');
        sparkle.style.left = centerX + 'px';
        sparkle.style.top = centerY + 'px';
        
        const angle = (Math.PI * 2 * i) / 6;
        const distance = 30 + Math.random() * 20;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        
        sparkle.style.setProperty('--tx', tx + 'px');
        sparkle.style.setProperty('--ty', ty + 'px');
        
        document.body.appendChild(sparkle);
        
        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    function updateProgress() {
      let totalCompleted = 0;
      let completedImages = 0;
      const totalPuzzlePieces = imageList.length * totalPieces;

      imageList.forEach(img => {
        if (completedPuzzles[img]) {
          totalCompleted += completedPuzzles[img].filter(x => x).length;
          if (completedPuzzles[img].every(x => x === true)) {
            completedImages++;
          }
        }
      });

      const percentage = (totalCompleted / totalPuzzlePieces) * 100;
      progressFill.style.width = percentage + '%';
      progressText.textContent = `${completedImages}/${imageList.length} ภาพ | ${totalCompleted}/${totalPuzzlePieces} ชิ้น (${Math.round(percentage)}%)`;
    }

    // Image selector with touch support
    document.querySelectorAll('.thumbnail').forEach(img => {
      img.addEventListener('click', function() {
        startGame(this, this.dataset.image);
      });
    });

    function startGame(el, imagePath) {
      document.querySelectorAll('.thumbnail').forEach(img => img.classList.remove('selected'));
      el.classList.add('selected');

      currentImage = imagePath;
      document.getElementById('gameContainer').style.display = 'flex';

      puzzleBoard.innerHTML = '';
      pieceContainer.innerHTML = '';
      correct = 0;

      // Create dropzones
      for (let i = 0; i < totalPieces; i++) {
        const dropzone = document.createElement('div');
        dropzone.classList.add('dropzone');
        dropzone.dataset.index = i;
        puzzleBoard.appendChild(dropzone);
      }

      let completedPieces = completedPuzzles[imagePath] || Array(totalPieces).fill(false);
      correct = completedPieces.filter(x => x).length;

      // Place completed pieces
      completedPieces.forEach((done, index) => {
        if (done) {
          const piece = createPiece(imagePath, index);
          piece.classList.add('correct');
          puzzleBoard.children[index].appendChild(piece);
        }
      });

      // Create remaining pieces
      const remainingPieces = [];
      for (let i = 0; i < totalPieces; i++) {
        if (!completedPieces[i]) remainingPieces.push(i);
      }

      remainingPieces.sort(() => Math.random() - 0.5);

      remainingPieces.forEach(i => {
        const piece = createPiece(imagePath, i);
        piece.dataset.index = i;
        
        // Add touch and mouse event listeners
        addDragListeners(piece);
        
        pieceContainer.appendChild(piece);
      });

      updateProgress();

      if (allPuzzlesCompleted()) {
        setTimeout(() => {
          overlay.style.display = 'block';
          popup.style.display = 'block';
        }, 300);
      } else {
        overlay.style.display = 'none';
        popup.style.display = 'none';
      }
    }

    function createPiece(imagePath, index) {
      const piece = document.createElement('div');
      piece.classList.add('piece');
      piece.style.backgroundImage = `url('${imagePath}')`;
      
      // Calculate background position based on grid position
      const col = index % cols;
      const row = Math.floor(index / cols);
      const percentX = (col * 100) / (cols - 1);
      const percentY = (row * 100) / (rows - 1);
      piece.style.backgroundPosition = `${percentX}% ${percentY}%`;
      
      piece.dataset.index = index;
      return piece;
    }

    function addDragListeners(piece) {
      // Mouse events
      piece.draggable = true;
      piece.addEventListener('dragstart', handleDragStart);
      piece.addEventListener('dragend', handleDragEnd);

      // Touch events
      piece.addEventListener('touchstart', handleTouchStart, { passive: false });
      piece.addEventListener('touchmove', handleTouchMove, { passive: false });
      piece.addEventListener('touchend', handleTouchEnd, { passive: false });
    }

    // Mouse drag handlers
    function handleDragStart(e) {
      draggedPiece = e.target;
      e.target.classList.add('dragging');
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedPiece = null;
    }

    // Touch handlers
    function handleTouchStart(e) {
      e.preventDefault();
      draggedPiece = e.target;
      draggedPiece.classList.add('dragging');
      
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      
      const rect = draggedPiece.getBoundingClientRect();
      pieceStartX = rect.left;
      pieceStartY = rect.top;
      
      // Make piece position fixed for dragging
      draggedPiece.style.position = 'fixed';
      draggedPiece.style.left = pieceStartX + 'px';
      draggedPiece.style.top = pieceStartY + 'px';
      draggedPiece.style.width = rect.width + 'px';
      draggedPiece.style.height = rect.height + 'px';
      draggedPiece.style.zIndex = '1000';
    }

    function handleTouchMove(e) {
      if (!draggedPiece) return;
      e.preventDefault();
      
      const touch = e.touches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;
      
      draggedPiece.style.left = (pieceStartX + deltaX) + 'px';
      draggedPiece.style.top = (pieceStartY + deltaY) + 'px';
      
      // Check if over a dropzone
      const dropzones = document.querySelectorAll('.dropzone');
      let overDropzone = null;
      
      dropzones.forEach(zone => {
        const rect = zone.getBoundingClientRect();
        if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
            touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
          overDropzone = zone;
        }
      });
      
      // Update dropzone styling
      dropzones.forEach(zone => zone.classList.remove('drag-over'));
      if (overDropzone) {
        overDropzone.classList.add('drag-over');
      }
    }

    function handleTouchEnd(e) {
      if (!draggedPiece) return;
      e.preventDefault();
      
      const touch = e.changedTouches[0];
      
      // Find the dropzone under the touch point
      const dropzones = document.querySelectorAll('.dropzone');
      let targetDropzone = null;
      
      dropzones.forEach(zone => {
        const rect = zone.getBoundingClientRect();
        if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
            touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
          targetDropzone = zone;
        }
      });
      
      // Reset piece styling
      draggedPiece.style.position = '';
      draggedPiece.style.left = '';
      draggedPiece.style.top = '';
      draggedPiece.style.width = '';
      draggedPiece.style.height = '';
      draggedPiece.style.zIndex = '';
      draggedPiece.classList.remove('dragging');
      
      // Clear drag-over styling
      dropzones.forEach(zone => zone.classList.remove('drag-over'));
      
      // Handle drop
      if (targetDropzone && !targetDropzone.hasChildNodes()) {
        handleDrop(targetDropzone, draggedPiece);
      }
      
      draggedPiece = null;
    }

    // Drag over and drop for mouse
    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      const dropzone = e.target.closest('.dropzone');
      if (dropzone) {
        document.querySelectorAll('.dropzone').forEach(z => z.classList.remove('drag-over'));
        dropzone.classList.add('drag-over');
      }
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      const dropzone = e.target.closest('.dropzone');
      document.querySelectorAll('.dropzone').forEach(z => z.classList.remove('drag-over'));
      
      if (dropzone && draggedPiece && !dropzone.hasChildNodes()) {
        handleDrop(dropzone, draggedPiece);
      }
    });

    function handleDrop(dropzone, piece) {
      const correctIndex = piece.dataset.index;
      const dropIndex = dropzone.dataset.index;

      if (correctIndex === dropIndex) {
        dropzone.appendChild(piece);
        correct++;
        piece.classList.add('correct');
        
        // Remove drag functionality from correct pieces
        piece.draggable = false;
        piece.style.cursor = 'default';
        piece.removeEventListener('touchstart', handleTouchStart);
        piece.removeEventListener('touchmove', handleTouchMove);
        piece.removeEventListener('touchend', handleTouchEnd);
        
        createSparkles(piece);

        if (!completedPuzzles[currentImage]) {
          completedPuzzles[currentImage] = Array(totalPieces).fill(false);
        }
        completedPuzzles[currentImage][correctIndex] = true;

        updateProgress();

        if (allPuzzlesCompleted()) {
          setTimeout(() => {
            overlay.style.display = 'block';
            popup.style.display = 'block';
          }, 300);
        }
      }
    }

    function allPuzzlesCompleted() {
      return imageList.every(img => {
        if (!completedPuzzles[img]) return false;
        return completedPuzzles[img].every(x => x === true);
      });
    }

    function resetGame() {
      for (const key in completedPuzzles) {
        delete completedPuzzles[key];
      }
      overlay.style.display = 'none';
      popup.style.display = 'none';
      bgm.pause();
      bgm.currentTime = 0;
      location.reload();
    }
  </script>
</body>
